name: CI

permissions:
  contents: write

# Déclenchement sur push ou PR sur main, dev, ou feat/*
on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python et uv
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # 3️⃣ Linting avec Ruff
      - name: Lint code with Ruff
        run: uv run ruff check .

      # 4️⃣ Tests unitaires avec pytest et couverture
      - name: Run tests with pytest
        run: |
          uv run pytest --cov-report=xml
          uv run genbadge coverage -i coverage.xml -o coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coverage.svg
          git commit -m "Update coverage badge" || echo "No changes"
          git push

      # 5️⃣ Audit de sécurité pour détecter les secrets
      - name: Secret scanning
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -r --exclude-dir=.git -n -E '([A-Za-z0-9_]{20,})' .