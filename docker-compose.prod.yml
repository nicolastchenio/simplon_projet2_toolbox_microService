services:

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-db

  api:
    image: nico9741975/mon-api:latest
    container_name: fastapi-api
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_HOST=db
    depends_on:
      - db
    networks:
      - api-db
      - front-api
    ports:
      - "8000:8000"

  front:
    image: nico9741975/mon-front:latest
    container_name: streamlit-front
    environment:
      - API_HOST=api
    depends_on:
      - api
    networks:
      - front-api
    ports:
      - "8501:8501"

networks:
  front-api:
  api-db:

volumes:
  postgres_data: